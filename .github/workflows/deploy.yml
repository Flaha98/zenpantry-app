name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; new pushes cancel the in-progress one
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  # ── Job 1: Build ────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:gh

      # GitHub Pages returns 404.html when a route is not found.
      # Copying index.html → 404.html makes the Angular router handle all URLs.
      - name: Fix SPA routing (copy index.html as 404.html)
        run: cp dist/zenpantry-app/browser/index.html dist/zenpantry-app/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/zenpantry-app/browser

  # ── Job 2: Deploy ────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
